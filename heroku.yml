setup:
  config:
    DB_URL: "./baileys_store.db"
    AUTO_STATUS_VIEW: "true"
    AUTO_STATUS_REACT: "true"
    STATUS_EMOJIS: "💙,🖤,⭐"
    AUTOREAD: "false"
    AUTOTYPING: "false"
    ANTICALL: "false"
    ANTIDELETE: "false"
    AUTOREACT: "false"
    ALWAYS_ONLINE: "false"
    FORCE_SESSION_RESET: "true"

build:
  docker:
    web: Dockerfile
    
run:
  web: npm start
